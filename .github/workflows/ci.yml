name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin assets
        run: npm run build

      - name: Build release zip
        run: npm run plugin-zip

      - name: Build WordPress.org submission zip
        run: npm run plugin-zip:org
