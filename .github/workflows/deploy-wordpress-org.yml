name: Deploy to WordPress.org

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: Skip the final SVN commit
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Derive WordPress.org version
        run: echo "WPORG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin assets
        run: npm run build

      - name: Build WordPress.org package
        run: npm run plugin-zip:org

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: slim-seo-preview-org
          path: artifacts/slim-seo-preview-org.zip

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          generate-zip: true
        env:
          SLUG: slim-seo-preview
          VERSION: ${{ env.WPORG_VERSION }}
          BUILD_DIR: artifacts/submission/slim-seo-preview
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
